name: Bug report
description: Report a defect in Talon
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search existing issues first to avoid
        duplicates. For security vulnerabilities, do **not** file a public issue —
        use private vulnerability reporting instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Talon is affected?
      multiple: true
      options:
        - talon-core
        - talon-coordinator
        - talon-worker
        - talon-fuse
        - build / CI / tooling
        - benchmarks / harness
        - docs
        - unsure
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. Include exact commands.
      placeholder: |
        1. cargo run -p talon-worker -- --listen 127.0.0.1:7001
        2. ...
        3. observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, panics, or stack traces verbatim.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in what's relevant.
      value: |
        - Talon version / commit:
        - `rustc --version`:
        - OS / kernel (`uname -a`):
        - Backend (S3 / GCS / Azure / n/a):
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / additional context
      description: Relevant logs (set `RUST_LOG=debug`), config, or screenshots.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I reproduced this on the latest `main` (or noted the commit above).
          required: false
